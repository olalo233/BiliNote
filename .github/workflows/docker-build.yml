name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 单 job 串行：build（仅 load 到本机）→ smoke 验证 → 全部通过才 push。
  # 曾经的两 job 结构（先 push 后 smoke）会把未经验证的镜像发布成 latest。
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve app version
        id: app-version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Raw tags support the fork-only v2.4.5e suffix without SemVer warnings.
          tags: |
            type=raw,value=${{ steps.app-version.outputs.version }},enable=${{ steps.app-version.outputs.version != '' }}
            type=sha,prefix=
            type=raw,value=latest,enable=true

      - name: Verify release image tags
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          IMAGE="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          grep -Fx "$IMAGE:$VERSION" <<< "$IMAGE_TAGS"
          grep -Fx "$IMAGE:latest" <<< "$IMAGE_TAGS"

      - name: Build Docker Image (load only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.complete
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_APP_VERSION=${{ steps.app-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Run image smoke tests
        shell: bash
        run: |
          set -euxo pipefail
          trap 'status=$?; echo "::error title=Smoke command failed::${BASH_COMMAND} (line ${LINENO})"; exit "$status"' ERR
          VERSION="${GITHUB_REF_NAME#v}"
          IMAGE="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          IMAGE_REF="$IMAGE:$VERSION"
          CONTAINER="bilinote-smoke"
          DIAG_DIR="${RUNNER_TEMP:-/tmp}/bilinote-smoke"
          mkdir -p "$DIAG_DIR"

          cleanup() {
            docker rm -f "$CONTAINER" "$CONTAINER-auto" >/dev/null 2>&1 || true
          }
          write_diagnostics() {
            # 除 docker logs（supervisord 输出）外，必须收容器内 backend.log——
            # python 的 traceback 只在那里，缺了它排障就是盲猜。
            docker logs "$CONTAINER" > "$DIAG_DIR/default-container.log" 2>&1 || true
            docker logs "$CONTAINER-auto" > "$DIAG_DIR/auto-update-container.log" 2>&1 || true
            docker exec "$CONTAINER" cat /var/log/supervisor/backend.log > "$DIAG_DIR/default-backend.log" 2>&1 || true
            docker exec "$CONTAINER-auto" cat /var/log/supervisor/backend.log > "$DIAG_DIR/auto-update-backend.log" 2>&1 || true
            {
              echo "### Docker smoke diagnostics"
              echo "Image: $IMAGE_REF"
              for f in default-container auto-update-container default-backend auto-update-backend; do
                echo "--- $f.log ---"
                sed -n '1,240p' "$DIAG_DIR/$f.log" 2>/dev/null || true
              done
            } >> "${GITHUB_STEP_SUMMARY:-$DIAG_DIR/summary.md}"
          }
          on_exit() {
            status=$?
            if [ "$status" -ne 0 ]; then
              write_diagnostics
            fi
            cleanup
            exit "$status"
          }
          trap on_exit EXIT

          docker run -d --name "$CONTAINER" --platform linux/amd64 -p 18080:80 "$IMAGE_REF"

          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:18080/api/sys_health >/tmp/sys-health.json; then
              break
            fi
            if [ "$attempt" = 60 ]; then
              docker logs "$CONTAINER"
              echo '::error title=Default container health timeout::/api/sys_health did not become ready.'
              exit 1
            fi
            sleep 2
          done

          HOME_HTML="$(curl -fsS http://127.0.0.1:18080/)"
          SETTINGS_HTML="$(curl -fsS http://127.0.0.1:18080/settings/model)"
          printf '%s' "$HOME_HTML" | grep -Eq 'src="/assets/[^" ]+\.js"'
          printf '%s' "$SETTINGS_HTML" | grep -Eq 'src="/assets/[^" ]+\.js"'
          ASSET_PATH="$(printf '%s' "$HOME_HTML" | sed -n 's/.*src="\([^" ]*\.js\)".*/\1/p' | head -n 1)"
          test -n "$ASSET_PATH"
          ASSET_TYPE="$(curl -fsS -o /tmp/bilinote-index.js -w '%{content_type}' "http://127.0.0.1:18080$ASSET_PATH")"
          case "$ASSET_TYPE" in
            application/javascript*|text/javascript*) ;;
            *) echo "Unexpected JavaScript content type: $ASSET_TYPE"; exit 1 ;;
          esac

          curl -fsS http://127.0.0.1:18080/api/model_list >/tmp/model-list.json
          curl -fsS http://127.0.0.1:18080/api/sys_health >/tmp/sys-health.json

          # Storage is optional in CI: verify the public config contract without
          # contacting MinIO or requiring credentials in GitHub Actions.
          curl -fsS http://127.0.0.1:18080/api/storage/config \
            | python -c 'import json, sys; payload=json.load(sys.stdin); assert payload.get("code") == 0, payload; data=payload.get("data"); assert isinstance(data, dict), payload; assert {"sources", "image_bed", "assets"}.issubset(data), data; assert data["sources"] == {}, data'

          # Unconfigured storage must not change the existing generation entry
          # contract. Stop at the existing request-schema validation boundary so
          # CI does not download a video or require a Whisper model/API key.
          GENERATE_STATUS="$(curl -sS -o /tmp/generate-note-unconfigured.json -w '%{http_code}' \
            -X POST http://127.0.0.1:18080/api/generate_note \
            -H 'content-type: application/json' \
            -d '{"video_url":"https://www.youtube.com/watch?v=BaW_avaa2Bc","platform":"youtube","quality":"medium"}')"
          test "$GENERATE_STATUS" = "422"
          python -c 'import json; payload=json.load(open("/tmp/generate-note-unconfigured.json")); assert isinstance(payload.get("detail"), list), payload'

          docker exec "$CONTAINER" deno --version | grep -Eq '^deno [0-9]+\.'
          test "$(docker exec "$CONTAINER" python -m yt_dlp --version)" = "2026.07.04"
          if docker exec "$CONTAINER" sh -c 'grep -Fq "Looking in indexes" /var/log/supervisor/backend.log'; then
            docker logs "$CONTAINER" || true
            echo '::error title=Unexpected default auto-update::default container attempted a yt-dlp update.'
            exit 1
          fi

          curl -fsS -X POST http://127.0.0.1:18080/api/update_downloader_cookie \
            -H 'content-type: application/json' \
            -d '{"platform":"youtube","cookie":"aaaaaaaaaaaa"}'
          curl -fsS http://127.0.0.1:18080/api/get_downloader_cookie/youtube | grep -F 'aaaaaaaaaaaa'
          curl -fsS -X DELETE http://127.0.0.1:18080/api/delete_downloader_cookie/youtube
          curl -fsS -X DELETE http://127.0.0.1:18080/api/delete_downloader_cookie/youtube
          curl -fsS http://127.0.0.1:18080/api/get_downloader_cookie/youtube | grep -F '未找到Cookies'

          # 自更新场景：坏 PyPI 源 + 开启自更新。断言三件事：开关生效（pip 确实跑了）、
          # backend 照常健康、内置 yt-dlp 版本不被破坏。
          # 两个历史教训（2026-07-13）：
          # 1) 不要卸载 yt-dlp 来"制造失败"——backend 顶层 import yt_dlp，卸载后必然起不来，
          #    测的是「包不存在」而非「升级失败降级」；
          # 2) 不要断言具体的"升级失败"消息——pip install -U 对已安装的包即使索引不可达
          #    也可能打印 Requirement already satisfied 后 exit 0，失败根本造不出来。
          docker run -d --name "$CONTAINER-auto" --platform linux/amd64 \
            -p 18081:80 \
            -e YTDLP_AUTO_UPDATE=1 \
            -e PIP_INDEX_URL=http://127.0.0.1:1/simple \
            -e PIP_RETRIES=0 \
            -e PIP_DEFAULT_TIMEOUT=1 \
            "$IMAGE_REF"
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:18081/api/sys_health >/dev/null; then
              break
            fi
            if [ "$attempt" = 60 ]; then
              docker logs "$CONTAINER-auto"
              echo '::error title=Auto-update container health timeout::/api/sys_health did not become ready after the update attempt.'
              exit 1
            fi
            sleep 2
          done
          test "$(docker exec "$CONTAINER-auto" python -m yt_dlp --version)" = "2026.07.04"
          if ! docker exec "$CONTAINER-auto" sh -c 'grep -Fq "Looking in indexes" /var/log/supervisor/backend.log'; then
            docker logs "$CONTAINER-auto" || true
            echo '::error title=Auto-update switch inert::YTDLP_AUTO_UPDATE=1 did not trigger a pip run (check supervisord command expansion).'
            exit 1
          fi

          if timeout 45s docker exec "$CONTAINER" python -m yt_dlp -F 'https://www.youtube.com/watch?v=YM0_8mOaKic' > /tmp/youtube-formats.txt 2>&1; then
            if grep -Eiq 'm4a|webm|audio' /tmp/youtube-formats.txt; then
              echo 'YouTube format check returned audio/video formats.'
            else
              echo '::warning::YouTube format check returned no recognizable format rows on this runner.'
            fi
          else
            echo '::warning::YouTube live format check was unavailable on this runner; run the same check on the NAS or another network-enabled Linux host.'
          fi

          if timeout 45s docker exec "$CONTAINER" python -m yt_dlp -F 'https://www.bilibili.com/video/BV1CNLQ6REGh' > /tmp/bilibili-formats.txt 2>&1; then
            if grep -Eiq 'audio|video|mp4|m4a' /tmp/bilibili-formats.txt; then
              echo 'Bilibili format check returned audio/video formats.'
            else
              echo '::warning::Bilibili format check returned no recognizable format rows on this runner.'
            fi
          else
            echo '::warning::Bilibili live format check was unavailable on this runner; run the same check on the NAS or another network-enabled Linux host.'
          fi

      - name: Upload smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bilinote-smoke-diagnostics-${{ github.run_id }}
          path: ${{ runner.temp }}/bilinote-smoke/
          if-no-files-found: ignore

      - name: Push verified image tags
        shell: bash
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker push "$tag"
          done <<< "$IMAGE_TAGS"

      - name: Generate Usage Instructions
        run: |
          echo "=========================================="
          echo "Docker Image Published!"
          echo "=========================================="
          echo ""
          echo "Pull the image:"
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "Run the container:"
          echo "  docker run -d -p 80:80 \\"
          echo "    -v bilinote-data:/app/backend/data \\"
          echo "    -v bilinote-config:/app/backend/config \\"
          echo "    -v bilinote-static:/app/backend/static \\"
          echo "    -v bilinote-models:/app/backend/models \\"
          echo "    --name bilinote \\"
          echo "    ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "Access the application at: http://localhost"
          echo "=========================================="
